<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0b0b0b"/>

  <!-- Car body (front view) -->
  <rect x="16" y="26" width="32" height="16" rx="6" fill="#1f2937"/>

  <!-- Windshield -->
  <rect x="20" y="20" width="24" height="10" rx="4" fill="#334155"/>

  <!-- Wheels -->
  <circle cx="22" cy="44" r="3" fill="#6b7280"/>
  <circle cx="42" cy="44" r="3" fill="#6b7280"/>

  <!-- Scan reticle -->
  <circle cx="32" cy="30" r="6"
          fill="none"
          stroke="url(#g)"
          stroke-width="2"/>

  <!-- Scan center -->
  <circle cx="32" cy="30" r="2" fill="#ef4444"/>
</svg>
